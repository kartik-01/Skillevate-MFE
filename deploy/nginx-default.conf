server {
    listen       80;
    listen       [::]:80;
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;

    # Module Federation chunks / remote loads from other origins — keep permissive for static bundles.
    add_header Cross-Origin-Resource-Policy "cross-origin";
    add_header Access-Control-Allow-Origin "*";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|mjs)$ {
        # Hashed filenames are safe to cache long-term; remoteEntry.js is not hashed — shorter TTL handled by webpack filename.
        add_header Cache-Control "public, max-age=86400";
    }
}
